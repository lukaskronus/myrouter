name: Build Pure TTL Package with New Kernel (V6)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Download Original TTL Package
      run: |
        wget --no-check-certificate -c "https://node4.histb.com:9088/update/system/TTL-hi3798mv100-32bit.zip" -O original_ttl.zip
        unzip -l original_ttl.zip | head -10

    - name: 3. Extract Original Package
      run: |
        mkdir -p ttl_template
        unzip -q original_ttl.zip -d ttl_template/
        ls -la ttl_template/

    - name: 4. Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-user-static debootstrap e2fsprogs zip \
          gcc-arm-linux-gnueabihf u-boot-tools bc bison flex libssl-dev \
          libncurses5-dev zlib1g-dev device-tree-compiler

    - name: 5.1. Setup Kernel Build Cache
      uses: actions/cache@v3
      with:
        path: kernel_build/mv100
        key: kernel-v6-${{ hashFiles('config_files/hi3798mv100-v6.dts') }}-${{ runner.os }}
        restore-keys: |
          kernel-v6-${{ runner.os }}-
          kernel-v6-

    - name: 5.2. Clone Kernel Repository (if not cached)
      run: |
        if [ ! -d "kernel_build/mv100" ]; then
          mkdir -p kernel_build
          cd kernel_build
          git clone --single-branch --depth=1 https://github.com/loonpn/ec6108v9c-linux-kernel mv100
          echo "Kernel repository cloned"
        else
          echo "Using cached kernel repository"
          cd kernel_build/mv100
          git status
        fi
        ls -la kernel_build/mv100/ | head -20

    - name: 5.3. Prepare Kernel Configuration with Debug Options
      run: |
        cd kernel_build/mv100
        
        echo "=== Copying custom DTS file from config_files ==="
        if [ -f "${GITHUB_WORKSPACE}/config_files/hi3798mv100-v6.dts" ]; then
          cp -v "${GITHUB_WORKSPACE}/config_files/hi3798mv100-v6.dts" arch/arm/boot/dts/hi3798mv100-ec6108v9c.dts
        else
          echo "ERROR: Custom DTS not found"
          exit 1
        fi
        
        echo "=== Configuring kernel ==="
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- hi3798mv100_defconfig
        
        echo "=== Applying boot compatibility patches ==="
        sed -i 's/CONFIG_THUMB2_KERNEL=y/CONFIG_THUMB2_KERNEL=n/' .config
        sed -i 's/CONFIG_ALLOW_UNALIGNED_ACCESS=y/CONFIG_ALLOW_UNALIGNED_ACCESS=n/' .config
        sed -i 's/CONFIG_NEON=y/CONFIG_NEON=n/' .config
        sed -i 's/CONFIG_VFPv3=y/CONFIG_VFPv3=n/' .config
        sed -i 's/CONFIG_KERNEL_GZIP=y/CONFIG_KERNEL_GZIP=n/' .config
        sed -i 's/CONFIG_KERNEL_BZIP2=y/CONFIG_KERNEL_BZIP2=n/' .config
        sed -i 's/CONFIG_ATAGS=.*/CONFIG_ATAGS=y/' .config
        sed -i 's/CONFIG_CMDLINE_FROM_BOOTLOADER=.*/CONFIG_CMDLINE_FROM_BOOTLOADER=y/' .config
        
        echo "=== Enabling debug options ==="
        # Enable early printk for debugging
        sed -i 's/CONFIG_DEBUG_LL=.*/CONFIG_DEBUG_LL=y/' .config
        sed -i 's/CONFIG_EARLY_PRINTK=.*/CONFIG_EARLY_PRINTK=y/' .config
        
        # Enable kernel debugging
        sed -i 's/CONFIG_DEBUG_KERNEL=.*/CONFIG_DEBUG_KERNEL=y/' .config
        sed -i 's/CONFIG_PRINTK=.*/CONFIG_PRINTK=y/' .config
        
        # Disable some potentially problematic features
        sed -i 's/CONFIG_DEVTMPFS_MOUNT=.*/CONFIG_DEVTMPFS_MOUNT=n/' .config

        echo "=== Enabling appended DTB support ==="
        # Tell kernel to look for DTB appended to zImage
        echo "CONFIG_ARM_APPENDED_DTB=y" >> .config
        echo "CONFIG_ARM_ATAG_DTB_COMPAT=y" >> .config
        
        # This lets the kernel merge ATAGS bootargs with DTB chosen node
        # so the bootloader's bootargs= still work
        echo "CONFIG_ARM_ATAG_DTB_COMPAT_CMDLINE_FROM_BOOTLOADER=y" >> .config

        # Disable PSCI since bootloader doesn't support it
        sed -i 's/CONFIG_ARM_PSCI=y/CONFIG_ARM_PSCI=n/' .config

        # Make sure ARM_HISILICON platform is enabled
        echo "CONFIG_ARCH_HISI=y" >> .config
        
        echo "Kernel configuration completed"
        echo ""
        echo "=== Debug Configuration ==="
        grep -E "CONFIG_DEBUG_LL|CONFIG_EARLY_PRINTK|CONFIG_DEBUG_KERNEL|CONFIG_PRINTK|CONFIG_DEVTMPFS" .config

    - name: 5.4. Build Kernel (with cache)
      run: |
        cd kernel_build/mv100
        
        echo "Building kernel with $(nproc) CPU cores..."
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc) zImage 2>&1 | tee build.log
        
        if [ ! -f "arch/arm/boot/Image" ]; then
          echo "ERROR: Image not found!"
          exit 1
        fi
        
        ls -lh arch/arm/boot/Image

    - name: 5.5. Create uImage - zImage + DTB
      run: |
        cd kernel_build/mv100

        # Build DTBs explicitly
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- dtbs

        DTB_FILE="arch/arm/boot/dts/hi3798mv100-ec6108v9c.dtb"

        if [ ! -f "$DTB_FILE" ]; then
          echo "ERROR: DTB not found. Available hi3798 DTBs:"
          find arch/arm/boot/dts/ -name "hi3798*.dtb"
          exit 1
        fi

        echo "Combining zImage + DTB..."
        cat arch/arm/boot/zImage "$DTB_FILE" > zImage-dtb

        echo "Creating uImage..."
        mkimage -A arm -O linux -T kernel -C none \
          -a 0x2000000 -e 0x2000000 \
          -n linux -d zImage-dtb uImage

        ls -lh uImage zImage-dtb

    - name: 5.6. Verify Kernel Size Fits Partition
      run: |
        cd kernel_build/mv100
        
        KERNEL_SIZE=$(stat -c%s uImage)
        KERNEL_SIZE_MB=$(echo "scale=2; $KERNEL_SIZE / 1048576" | bc)
        MAX_SIZE=$((30 * 1048576))
        
        echo "=== Kernel Size Check ==="
        echo "New kernel size: ${KERNEL_SIZE_MB}MB"
        echo "Partition size: 30MB"
        echo "Remaining space: $(echo "scale=2; (30 - $KERNEL_SIZE_MB)" | bc)MB"
        
        if [ $KERNEL_SIZE -gt $MAX_SIZE ]; then
          echo "ERROR: Kernel too large for 30MB partition!"
          exit 1
        fi
        
        echo "✓ Kernel fits in partition"

    - name: 5.7. Build Kernel Modules and Headers
      run: |
        cd kernel_build/mv100
        
        echo "Building kernel modules..."
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- INSTALL_MOD_STRIP=1 INSTALL_MOD_PATH=../kernel_modules modules_install
        
        echo "Installing kernel headers..."
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- INSTALL_HDR_PATH=../kernel_headers headers_install
        
        echo "Modules and headers completed"

    - name: 5.8. Package Kernel Build Artifacts
      run: |
        cd kernel_build
        
        tar -zcvf linux-build.tar.gz kernel_headers kernel_modules
        ls -lh linux-build.tar.gz

    - name: 5.9. Copy uImage to Workspace
      run: |
        cp kernel_build/mv100/uImage ${GITHUB_WORKSPACE}/new_uImage
        ls -lh ${GITHUB_WORKSPACE}/new_uImage

    - name: 6. Build Pure Debian 12 Rootfs
      run: |
        chmod +x build_rootfs.sh
        ./build_rootfs.sh

    - name: 7. Install Kernel Modules into Debian Rootfs
      run: |
        ROOTFS_DIR=$(pwd)/pure_rootfs
        
        echo "Installing kernel modules into Debian rootfs..."
        sudo mkdir -p "$ROOTFS_DIR/lib/modules"
        
        sudo tar -xzf kernel_build/linux-build.tar.gz -C /tmp
        
        sudo cp -a /tmp/kernel_modules/lib/modules/* "$ROOTFS_DIR/lib/modules/" || true
        
        sudo mount -t proc none "$ROOTFS_DIR/proc" || true
        sudo mount -t sysfs none "$ROOTFS_DIR/sys" || true
        sudo chroot "$ROOTFS_DIR" depmod -a || echo "depmod warnings are normal during cross-build"
        sudo umount "$ROOTFS_DIR/proc" "$ROOTFS_DIR/sys" 2>/dev/null || true

    - name: 8. Create Pure Rootfs Image
      run: |
        ORIG_SIZE=$(stat -c%s "ttl_template/rootfs-32.img")
        
        dd if=/dev/zero of=rootfs-32-pure.img bs=1 count=0 seek=$ORIG_SIZE
        mkfs.ext4 -F -L "rootfs" rootfs-32-pure.img
        
        mkdir -p temp_mount
        sudo mount -o loop rootfs-32-pure.img temp_mount
        sudo cp -a pure_rootfs/* temp_mount/
        sync
        sudo umount temp_mount
        
        ls -lh rootfs-32-pure.img

    - name: 9. Replace Kernel and Package Final TTL
      run: |
        cp -r ttl_template/ final_package/
        cp rootfs-32-pure.img final_package/rootfs-32.img
        cp new_uImage final_package/uImage || cp new_uImage final_package/boot/uImage || true
        
        cd final_package
        zip -r ../TTL-hi3798mv100-32bit-PURE-KernelV6-$(date +%Y%m%d).zip .
        cd ..
        
        ls -lh TTL-hi3798mv100-32bit-PURE-KernelV6-*.zip

    - name: 10. Upload Artifacts - Kernel uImage
      uses: actions/upload-artifact@v4
      with:
        name: kernel-uimage
        path: new_uImage
        retention-days: 7

    - name: 11. Upload Artifacts - Rootfs Image
      uses: actions/upload-artifact@v4
      with:
        name: rootfs-image
        path: rootfs-32-pure.img
        retention-days: 7

    - name: 12. Upload Artifacts - Complete TTL Package
      uses: actions/upload-artifact@v4
      with:
        name: ttl-package
        path: TTL-hi3798mv100-32bit-PURE-KernelV6-*.zip
        retention-days: 7

    - name: 13. Upload Artifacts - Build Logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: kernel_build/mv100/build.log
        retention-days: 7
