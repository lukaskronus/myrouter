name: Build Minix Neo X5 Image
on:
  workflow_dispatch: # This adds a "Play" button so you can start it manually

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Armbian Build Framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          ref: main # Use the latest version

      - name: Build Armbian Image
        run: |
          # We use the MK808 config because it's the closest to the Neo X5
          ./compile.sh \
            BOARD=mk808 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_ONLY=no \
            KERNEL_CONFIGURE=no \
            EXPERT=yes

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minix-Neo-X5-Image
          path: output/images/*.img.xz
