name: mpv + ffmpeg nightly - Linux x86_64

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 9 * * *'       # Daily at 09:00 UTC
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/mpv-ffmpeg-nightly-linux.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git ca-certificates \
            meson ninja-build pkg-config python3 python3-pip \
            yasm nasm cmake autoconf automake libtool \
            texinfo wget unzip patch

      - name: Install FFmpeg build dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            libass-dev libfreetype6-dev libfontconfig-dev libfribidi-dev \
            libharfbuzz-dev libssl-dev libxml2-dev libbz2-dev libz-dev \
            zlib1g-dev liblzma-dev libdav1d-dev libaom-dev libsvtav1-dev \
            libvmaf-dev libvorbis-dev libopus-dev libspeex-dev libtheora-dev \
            libopenjp2-7-dev libsnappy-dev libsoxr-dev libvidstab-dev \
            libx264-dev libx265-dev libnuma-dev libvpx-dev libwebp-dev \
            libxvidcore-dev libgsm1-dev libshine-dev libtwolame-dev \
            libmysofa-dev liblilv-dev libsrt-openssl-dev librist-dev \
            libopenal-dev libpulse-dev libjack-dev libsndio-dev \
            libsamplerate0-dev librubberband-dev libbs2b-dev libzvbi-dev \
            libaribb24-dev libdrm-dev libva-dev libvdpau-dev \
            libsixel-dev libshaderc-dev glslang-tools libplacebo-dev \
            liblcms2-dev libjxl-dev

      - name: Clone and build latest static FFmpeg
        run: |
          git clone --depth=1 --single-branch https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src

          ./configure \
            --prefix=/ffmpeg-install \
            --pkg-config-flags="--static" \
            --extra-cflags="-I/ffmpeg-install/include" \
            --extra-ldflags="-L/ffmpeg-install/lib" \
            --extra-libs="-lpthread -lm" \
            --ld="g++" \
            --bindir=/ffmpeg-install/bin \
            --enable-gpl \
            --enable-gnutls \
            --enable-libass \
            --enable-libfreetype \
            --enable-libfribidi \
            --enable-libharfbuzz \
            --enable-libfontconfig \
            --enable-openssl \
            --enable-libaom \
            --enable-libdav1d \
            --enable-libsvtav1 \
            --enable-libvmaf \
            --enable-libvorbis \
            --enable-libopus \
            --enable-libspeex \
            --enable-libtheora \
            --enable-libvpx \
            --enable-libwebp \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libxvid \
            --enable-libzimg \
            --enable-libplacebo \
            --enable-vulkan \
            --enable-vaapi \
            --enable-vdpau \
            --enable-libdrm \
            --enable-libsrt \
            --enable-librist \
            --enable-libmysofa \
            --enable-libopenal \
            --enable-libpulse \
            --enable-libjack \
            --enable-libsndio \
            --enable-librubberband \
            --enable-libbs2b \
            --enable-libzvbi \
            --enable-libaribb24 \
            --enable-static \
            --disable-shared

          make -j$(nproc)
          make install

          # Create version file
          ./ffmpeg -version > /ffmpeg-install/ffmpeg-version.txt
          git rev-parse --short HEAD > /ffmpeg-install/ffmpeg-git-short.txt

      - name: Package FFmpeg artifact
        run: |
          cd /ffmpeg-install
          tar -czf ${{ github.workspace }}/ffmpeg-linux-x86_64-static.tar.gz \
            bin/ffmpeg \
            bin/ffprobe \
            ffmpeg-version.txt \
            ffmpeg-git-short.txt

      - name: Upload FFmpeg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x86_64-static
          path: ffmpeg-linux-x86_64-static.tar.gz
          retention-days: 7

      - name: Install mpv-specific dependencies (if not already covered)
        run: |
          sudo apt-get install -y --no-install-recommends \
            libluajit-5.1-dev libx11-dev libxext-dev libxpresent-dev \
            libxscrnsaver-dev libxv-dev libx11-xcb-dev libxcb1-dev \
            libxcb-shm0-dev libxcb-xfixes0-dev libxcb-present-dev \
            libxkbcommon-dev libwayland-dev wayland-protocols \
            libshaderc-dev glslang-tools

      - name: Clone latest mpv source
        run: |
          git clone --depth=1 --single-branch https://github.com/mpv-player/mpv.git mpv-src

      - name: Configure mpv with custom FFmpeg
        working-directory: mpv-src
        env:
          PKG_CONFIG_PATH: /ffmpeg-install/lib/pkgconfig
        run: |
          meson setup build \
            --buildtype=release \
            --strip=true \
            -Db_lto=true \
            -Ddefault_library=shared \
            -Dcplayer=true \
            -Dlibmpv=true \
            -Dman=true \
            -Dtests=false \
            -Dgl=enabled \
            -Dvulkan=enabled \
            -Dwayland=enabled \
            -Dx11=enabled \
            -Dsixel=enabled \
            -Dlibplacebo=enabled \
            -Dshaderc=enabled \
            -Ddrm=enabled \
            -Dvaapi=enabled \
            -Dvdpau=enabled \
            -Dplain=enabled \
            -Djavascript=enabled \
            -Dswift-static=disabled

      - name: Compile mpv
        working-directory: mpv-src
        run: meson compile -C build -j$(nproc)

      - name: Install mpv to staging directory
        working-directory: mpv-src
        run: |
          mkdir -p ../artifact/bin
          meson install -C build --destdir=../../artifact --no-rebuild --skip-subprojects

      - name: Create mpv version stamp
        working-directory: mpv-src/build
        run: |
          ./mpv --version > ../../artifact/mpv-version.txt
          git -C ../../mpv-src rev-parse --short HEAD > ../../artifact/mpv-git-short.txt

      - name: Package mpv artifact
        run: |
          cd artifact
          tar -czf ../mpv-linux-x86_64.tar.gz \
            bin/mpv \
            bin/mpvidentify.sh \
            bin/umpv \
            mpv-version.txt \
            mpv-git-short.txt

      - name: Upload mpv artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpv-linux-x86_64
          path: mpv-linux-x86_64.tar.gz
          retention-days: 7

      # Optional: create a release only on manual trigger
      - name: Create GitHub Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: mpv + ffmpeg nightly Linux build
          body: |
            FFmpeg: $(cat /ffmpeg-install/ffmpeg-git-short.txt)
            mpv:    $(cat artifact/mpv-git-short.txt)
            Built on $(date -u +"%Y-%m-%d %H:%M UTC")
          files: |
            ffmpeg-linux-x86_64-static.tar.gz
            mpv-linux-x86_64.tar.gz
          generate_release_notes: false
